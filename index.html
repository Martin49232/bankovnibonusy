<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bankovní Bonusy | Nejlepší účty v ČR</title>
    <style>
        /* Basic CSS Reset and Styling */
        body { font-family: system-ui, -apple-system, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { text-align: center; color: #1a365d; }
        .subtitle { text-align: center; color: #4a5568; margin-bottom: 40px; }
        
        /* Grid Layout for Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; border: 1px solid #e2e8f0;}
        .card img { max-width: 140px; height: auto; margin-bottom: 16px; }
        
        /* Typography */
        .bank-name { font-size: 1.2em; font-weight: 600; margin: 0; }
        .meta { font-size: 0.85em; color: #718096; margin-bottom: 12px; }
        .bonus { font-size: 1.8em; font-weight: 700; color: #2f855a; margin: 10px 0; }
        
        /* Lists and Buttons */
        .requirements { flex-grow: 1; font-size: 0.9em; margin-bottom: 24px; padding-left: 20px; color: #4a5568; }
        .btn { display: block; text-align: center; background: #3182ce; color: white; text-decoration: none; padding: 12px; border-radius: 6px; font-weight: 600; transition: background 0.2s; }
        .btn:hover { background: #2b6cb0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bankovní Bonusy</h1>
        <p class="subtitle">Přehled aktuálních finančních odměn za založení účtu u českých bank.</p>
        
        <div id="deals-container" class="grid"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Fetch the static JSON file
            fetch('data.json')
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.json();
                })
                .then(data => renderDeals(data))
                .catch(error => console.error('Error loading data:', error));
        });

        function renderDeals(deals) {
            const container = document.getElementById('deals-container');
            
            deals.forEach(deal => {
                // Map the requirements array to HTML list items
                const reqList = deal.requirements.map(req => `<li>${req}</li>`).join('');
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${deal.logoUrl}" alt="${deal.bankName} logo">
                    <h2 class="bank-name">${deal.bankName}</h2>
                    <div class="meta">${deal.accountName} | Vedení: ${deal.monthlyFee}</div>
                    <div class="bonus">${deal.bonusAmount}</div>
                    <strong>Podmínky získání:</strong>
                    <ul class="requirements">${reqList}</ul>
                    <a href="${deal.link}" target="_blank" rel="noopener noreferrer" class="btn">Získat bonus</a>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
